# ─────────────────────────────────────────────────────────────────────────────
# YOLO Fine-Tuning Dataset Configuration
# Used with: yolo detect train data=configs/yolo_finetune.yaml ...
# ─────────────────────────────────────────────────────────────────────────────

path: data/processed      # Root directory (relative to project root)
train: train/images
val:   val/images
test:  test/images        # Optional

# Number of classes
nc: 5

# Class names (unified vehicle taxonomy)
names:
  0: car
  1: truck
  2: bus
  3: motorcycle
  4: bicycle
